openapi: 3.0.0
info:
  title: task-management-api
  version: 1.0.0
  description: Task management API
  contact:
    email: stephane.tailland@ibm.com
servers:
  - url: https://api.example.com/v1
tags:
  - name: Tasks
    description: Tasks
paths:
  /tasks:
    get:
      summary: Retrieve a list of tasks
      description: Use this method to list and filter tasks
      tags:
        - Tasks
      parameters:
        - name: assignee
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - todo
              - inprogress
              - blocked
              - done
              - cancelled
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: A list of tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
      operationId: retrieve-list-tasks
    post:
      summary: Create a new task
      description: Use this method to create new tasks
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
      operationId: create-new-task
  /tasks/{taskId}:
    parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Retrieve a task by ID
      description: Use this method to retrieve a task given its ID
      tags:
        - Tasks
      responses:
        '200':
          description: Task retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
        '500':
          description: Internal server error
      operationId: retrieve-task-id
    put:
      summary: Update a task by ID
      description: Use this method to update a task
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Task'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
        '500':
          description: Internal server error
      operationId: update-task-id
    delete:
      summary: Delete a task by ID
      description: Use this method to delete a task
      tags:
        - Tasks
      responses:
        '204':
          description: Task deleted
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
        '500':
          description: Internal server error
      operationId: delete-task-id
components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        creator:
          type: string
        assignee:
          type: string
        status:
          type: string
          enum:
            - todo
            - inprogress
            - blocked
            - done
            - cancelled
        targetDate:
          type: string
          format: date-time
        description:
          type: string
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Error:
      type: object
      properties:
        errorId:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        code:
          type: string
        message:
          type: string
